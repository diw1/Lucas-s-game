<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lucas's Game Hub</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="hub-shell">
      <header class="hero">
        <div>
          <p class="kicker">Lucas's game collection</p>
          <h1>Choose a game</h1>
        </div>
        <div class="hero-badge" aria-hidden="true">
          <img src="assets/characters/peashooter.png" alt="" />
          <img src="assets/characters/zombie.png" alt="" />
        </div>
      </header>

      <section class="game-grid" aria-label="Game list">
        <a class="game-card piano" href="piano-garden/">
          <img src="assets/characters/sunflower.png" alt="" />
          <span>Piano Garden vs Zombies</span>
          <strong>Practice songs, hear demos, and defend the lawn with piano notes.</strong>
        </a>

        <a class="game-card block" href="block-garden-defense/">
          <img src="assets/minecraft/zombie.png" alt="" />
          <span>Block Garden Defense</span>
          <strong>Plant PvZ heroes on Minecraft blocks and survive waves.</strong>
        </a>

        <a class="game-card guess" href="pvz-guess-who/">
          <img src="assets/characters/cherry-bomb.png" alt="" />
          <span>PvZ Guess Who</span>
          <strong>Guess plants, zombies, fusions, and clues.</strong>
        </a>
      </section>
    </main>
  </body>
</html>
