<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lucas's Piano Garden vs Zombies</title>
    <link rel="stylesheet" href="styles.css?v=back-home-20260620" />
  </head>
  <body>
    <a class="back-home" href="../index.html" aria-label="Back to games">← Games</a>
    <main class="game-shell">
      <header class="hud">
        <div class="title-lockup">
          <p class="eyebrow">Piano practice prototype</p>
          <h1>Piano Garden vs Zombies</h1>
        </div>

        <section class="stats" aria-label="Game stats">
          <div>
            <span>Garden</span>
            <strong id="gardenHealth">5</strong>
          </div>
          <div>
            <span>Combo</span>
            <strong id="comboCount">0</strong>
          </div>
          <div>
            <span>Stars</span>
            <strong id="starCount">0</strong>
          </div>
        </section>

        <button id="restartButton" class="icon-button" type="button" title="Restart" aria-label="Restart">↻</button>
      </header>

      <section class="song-picker" aria-label="Choose song">
        <button class="song-button mid-song is-selected" type="button" data-song="0">Jingle Bells</button>
        <button class="song-button mid-song" type="button" data-song="1">Saints</button>
        <button class="song-button mid-song" type="button" data-song="2">Yankee</button>
        <button class="song-button mid-song" type="button" data-song="3">Twinkle</button>
        <button class="song-button mid-song" type="button" data-song="4">Frere Jacques</button>
        <button class="song-button licensed-song" type="button" data-song="5">Ode to Joy</button>
        <button class="song-button licensed-song" type="button" data-song="6">Amazing Grace</button>
        <button class="song-button licensed-song" type="button" data-song="7">Fur Elise</button>
        <button class="song-button licensed-song" type="button" data-song="8">Can-Can</button>
        <button class="song-button licensed-song" type="button" data-song="9">Auld Lang Syne</button>
        <button class="song-button licensed-song" type="button" data-song="10">Greensleeves</button>
        <button class="song-button licensed-song" type="button" data-song="11">Pokemon Lead</button>
        <button class="song-button licensed-song" type="button" data-song="12">Pokemon Piano</button>
        <button class="song-button licensed-song" type="button" data-song="13">PVZ Theme</button>
        <button id="customSongButton" class="song-button custom-song" type="button" data-song="14" disabled>Imported Theme</button>
      </section>

      <section class="theme-tools" aria-label="Real theme tools">
        <div class="theme-sources">
          <span>Real theme sheets</span>
          <a href="https://www.musicnotes.com/sheetmusic/sheet-music-boss/grasswalk/MN0288998" target="_blank" rel="noreferrer">PVZ Grasswalk</a>
          <a href="https://sheetmusicboss.com/2024/04/13/graze-the-roof-from-plants-vs-zombies-piano-tutorial/" target="_blank" rel="noreferrer">PVZ Graze the Roof</a>
          <a href="https://www.musicnotes.com/sheetmusic/pok%C3%A9mon-theme/74936" target="_blank" rel="noreferrer">Pokemon Theme</a>
          <a href="https://www.musicnotes.com/sheetmusic/minecraft/sweden/MN0122686" target="_blank" rel="noreferrer">Minecraft Sweden</a>
        </div>
        <div class="custom-loader">
          <textarea id="customSongInput" aria-label="Paste song notes" placeholder="C D Eb F# | G A Bb C2 D2"></textarea>
          <button id="loadCustomButton" class="primary-button secondary-button" type="button">Load</button>
          <button id="clearCustomButton" class="icon-button" type="button" title="Clear imported song" aria-label="Clear imported song">×</button>
        </div>
      </section>

      <section class="difficulty-picker" aria-label="Choose difficulty">
        <button class="difficulty-button is-selected" type="button" data-difficulty="practice">Practice</button>
        <button class="difficulty-button" type="button" data-difficulty="rush">Zombie Rush</button>
        <button class="difficulty-button" type="button" data-difficulty="boss">Boss Mode</button>
      </section>

      <section class="lesson-bar" aria-label="Piano target">
        <div class="plant-meter">
          <img src="../assets/characters/sunflower.png" alt="" />
          <div>
            <span>Plant Power</span>
            <div class="meter-track">
              <div id="plantPower" class="meter-fill"></div>
            </div>
          </div>
        </div>

        <div class="target-panel">
          <span id="songLabel">Jingle Bells</span>
          <div id="sheetMusic" class="sheet-music"></div>
          <div id="notePattern" class="note-pattern"></div>
        </div>

        <div class="lesson-actions">
          <button id="soundButton" class="icon-button" type="button" title="Sound" aria-label="Sound">♪</button>
          <button id="demoButton" class="primary-button secondary-button" type="button">Demo</button>
          <button id="startButton" class="primary-button" type="button">Start</button>
        </div>
      </section>

      <section class="stage" aria-label="Piano garden battlefield">
        <div class="lane-labels" aria-hidden="true">
          <span>Melody</span>
          <span>Rhythm</span>
          <span>Chord</span>
        </div>
        <div id="battlefield" class="battlefield"></div>
        <div id="fxLayer" class="fx-layer" aria-hidden="true"></div>
      </section>

      <section class="piano-zone" aria-label="Piano keyboard">
        <p id="message" class="message">Press Start, then play the glowing notes.</p>
        <div id="keyboard" class="keyboard"></div>
      </section>

      <div id="endOverlay" class="end-overlay is-hidden" role="dialog" aria-modal="true" aria-labelledby="endTitle">
        <div class="end-card">
          <p id="endKicker">Victory</p>
          <h2 id="endTitle">The garden is safe.</h2>
          <button id="playAgainButton" class="primary-button" type="button">Play Again</button>
        </div>
      </div>
    </main>

    <script src="script.js?v=open-references-20260618"></script>
  </body>
</html>
